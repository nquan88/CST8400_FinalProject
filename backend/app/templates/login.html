<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Smart Reading Tracker</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">

<div class="auth-card">
  <div class="auth-logo">
    <div class="icon">📚</div>
    <h1>ReadTrack</h1>
    <p>Smart Reading Habit Tracker</p>
  </div>

  <div id="login-alert" class="alert"></div>

  <form id="login-form">
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" class="form-control" placeholder="Enter your username" required autocomplete="username">
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" class="form-control" placeholder="Enter your password" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">
      Login
    </button>
  </form>

  <div class="auth-footer">
    Don't have an account? <a href="/register">Sign up</a>
  </div>
</div>

<script src="{{ url_for('static', filename='js/api.js') }}"></script>
<script>
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    hideAlert('login-alert');

    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value,
      }),
    });

    const data = await res.json();
    if (!res.ok) {
      showAlert('login-alert', data.error || 'Login failed.');
    } else {
      window.location.href = '/';
    }
  });
</script>
</body>
</html>
