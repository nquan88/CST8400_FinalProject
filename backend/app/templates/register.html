<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register – Smart Reading Tracker</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">

<div class="auth-card">
  <div class="auth-logo">
    <div class="icon">📚</div>
    <h1>Create Account</h1>
    <p>Start tracking your reading habits</p>
  </div>

  <div id="reg-alert" class="alert"></div>

  <form id="register-form">
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" class="form-control" placeholder="Choose a username" required autocomplete="username">
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" class="form-control" placeholder="your@email.com" required autocomplete="email">
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" class="form-control" placeholder="Choose a password (min 6 chars)" required autocomplete="new-password" minlength="6">
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">
      Create Account
    </button>
  </form>

  <div class="auth-footer">
    Already have an account? <a href="/login">Login</a>
  </div>
</div>

<script src="{{ url_for('static', filename='js/api.js') }}"></script>
<script>
  document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    hideAlert('reg-alert');

    const res = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({
        username: document.getElementById('username').value.trim(),
        email:    document.getElementById('email').value.trim(),
        password: document.getElementById('password').value,
      }),
    });

    const data = await res.json();
    if (!res.ok) {
      showAlert('reg-alert', data.error || 'Registration failed.');
    } else {
      window.location.href = '/';
    }
  });
</script>
</body>
</html>
